      <h2>To be a Dandelion Seed</h2>
      <p>Adrift, a dandelion seed</p>
      <p>not a moment knows it is free;</p>
      <p>doth not give thanks to the open air</p>
      <p>nor the winds which have carried it there</p>
      <p>but blossoms haplessly</p>
      <p>as though all things in its life were fair</p>
